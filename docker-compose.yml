version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agibank_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agibank}
      POSTGRES_USER: ${POSTGRES_USER:-agibank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agibank123}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - agibank_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agibank}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agibank_backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-agibank}
      DB_USER: ${POSTGRES_USER:-agibank}
      DB_PASS: ${POSTGRES_PASSWORD:-agibank123}
      JWT_SECRET: ${JWT_SECRET:-agibank_super_secret_2024}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agibank_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    container_name: agibank_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - agibank_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: agibank_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - agibank_net

volumes:
  pgdata:

networks:
  agibank_net:
    driver: bridge
